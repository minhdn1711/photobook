# ============================================================
# Photobook Platform — Nginx Virtual Host
# Routes:
#   /api/*          → Laravel PHP-FPM (backend:9000)
#   /storage/*      → Laravel public storage
#   /*              → Vue 3 Vite Dev Server (frontend:5173)
# ============================================================

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    # ── Docker DNS — re-resolve service names dynamically ────────
    # Without this, nginx caches IPs at startup and breaks when
    # containers are recreated (new IP).
    resolver 127.0.0.11 valid=10s ipv6=off;

    index index.php;
    charset utf-8;

    # ── API routes → PHP-FPM ─────────────────────────────────
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Laravel Storage (public disk) ───────────────────────
    location /storage {
        alias /var/www/html/storage/app/public;
        try_files $uri $uri/ =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── PHP-FPM handler ──────────────────────────────────────
    # Use a variable so nginx re-resolves 'backend' via Docker DNS
    # instead of caching the IP at startup time.
    location ~ \.php$ {
        set $php_backend backend;
        fastcgi_pass   $php_backend:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # ── Vite Dev Server with HMR WebSocket ──────────────────
    # WebSocket (HMR)
    location ^~ /@vite/client {
        set $vite_dev frontend;
        proxy_pass http://$vite_dev:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Vite internal paths (/@fs, /@id, /@vite) can resolve to dot-directories
    # Use ^~ so they bypass the later "deny hidden files" regex
    location ^~ /@fs {
        set $vite_dev_fs frontend;
        proxy_pass http://$vite_dev_fs:5173;
        proxy_set_header Host $host;
    }

    location ^~ /@id {
        set $vite_dev_id frontend;
        proxy_pass http://$vite_dev_id:5173;
        proxy_set_header Host $host;
    }

    location ^~ /@vite {
        set $vite_dev_vite frontend;
        proxy_pass http://$vite_dev_vite:5173;
        proxy_set_header Host $host;
    }

    location ^~ /node_modules {
        set $vite_dev2 frontend;
        proxy_pass http://$vite_dev2:5173;
        proxy_set_header Host $host;
    }

    location ^~ /src {
        set $vite_dev3 frontend;
        proxy_pass http://$vite_dev3:5173;
        proxy_set_header Host $host;
    }

    # Vite HMR WebSocket endpoint
    location ~ ^/__vite_hmr {
        set $vite_dev4 frontend;
        proxy_pass http://$vite_dev4:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── All other requests → Vite Dev Server ────────────────
    location / {
        set $vite_dev5 frontend;
        proxy_pass http://$vite_dev5:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ── Deny access to hidden files ──────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }
}
