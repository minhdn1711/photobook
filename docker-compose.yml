version: "3.9"

# ============================================================
# PHOTOBOOK PLATFORM — Docker Compose (Development)
# Services: postgres · redis · minio · backend · frontend · renderer · nginx · mailpit
# ============================================================

networks:
  photobook_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_vendor:
  frontend_node_modules:

services:

  # ──────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: photobook_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-photobook}
      POSTGRES_USER: ${DB_USERNAME:-photobook}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_FORWARD:-5432}:5432"
    networks:
      - photobook_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-photobook} -d ${DB_DATABASE:-photobook}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis 7 (Queue + Cache + Sessions)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: photobook_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    networks:
      - photobook_net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # MinIO (S3-Compatible Object Storage)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: photobook_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT_FORWARD:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_FORWARD:-9001}:9001"
    networks:
      - photobook_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO bucket auto-creation (runs once then exits)
  minio_setup:
    image: minio/mc:latest
    container_name: photobook_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - photobook_net
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing myminio/${MINIO_BUCKET_UPLOADS:-photobook-uploads};
      mc mb --ignore-existing myminio/${MINIO_BUCKET_RENDERS:-photobook-renders};
      mc anonymous set download myminio/${MINIO_BUCKET_UPLOADS:-photobook-uploads};
      echo 'MinIO buckets created';
      exit 0;
      "

  # ──────────────────────────────────────────────
  # Laravel Backend (PHP-FPM 8.3)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: photobook_backend
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-photobook}
      DB_USERNAME: ${DB_USERNAME:-photobook}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: ${MINIO_BUCKET_UPLOADS:-photobook-uploads}
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - photobook_net

  # Laravel Queue Worker
  queue_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: photobook_queue_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --verbose
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-photobook}
      DB_USERNAME: ${DB_USERNAME:-photobook}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      QUEUE_CONNECTION: redis
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      - backend
      - redis
    networks:
      - photobook_net

  # ──────────────────────────────────────────────
  # Vue 3 + Vite Frontend (Dev Server with HMR)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: photobook_frontend
    restart: unless-stopped
    working_dir: /app
    command: npm run dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
      VITE_MINIO_URL: ${VITE_MINIO_URL:-http://localhost:9000}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - photobook_net

  # ──────────────────────────────────────────────
  # Node.js Render Service (Sharp + PDFKit + BullMQ)
  # ──────────────────────────────────────────────
  renderer:
    build:
      context: ./renderer
      dockerfile: Dockerfile
      target: development
    container_name: photobook_renderer
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_UPLOADS: ${MINIO_BUCKET_UPLOADS:-photobook-uploads}
      MINIO_BUCKET_RENDERS: ${MINIO_BUCKET_RENDERS:-photobook-renders}
      BACKEND_API_URL: http://nginx/api
      BACKEND_API_SECRET: ${RENDERER_API_SECRET:-renderer_secret_key}
      RENDER_DPI: 300
      RENDER_COLOR_SPACE: cmyk
    volumes:
      - ./renderer:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - photobook_net

  # ──────────────────────────────────────────────
  # Nginx (Reverse Proxy + Static serving)
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: photobook_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - photobook_net

  # ──────────────────────────────────────────────
  # Mailpit (Dev Email Testing)
  # ──────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: photobook_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"  # Web UI
      # SMTP is on port 1025 (internal only)
    networks:
      - photobook_net
